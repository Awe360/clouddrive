---
- name: Ensure target directory exists for deployment
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: Clone CloudDrive repository from Git
  git:
    repo: "{{ repo_url }}"
    dest: "{{ app_dir }}"
    version: main
    force: yes
  become: no

- name: Install backend application package dependencies
  npm:
    path: "{{ app_dir }}/backend"
    state: present
  become: no

- name: Create PM2 ecosystem.config.js from template
  template:
    src: ecosystem.config.js.j2
    dest: "{{ app_dir }}/backend/ecosystem.config.js"
    mode: '0644'
  become: no

- name: Check if backend application is already running in PM2
  command: pm2 show clouddrive-api
  register: pm2_status
  ignore_errors: yes
  changed_when: false
  become: no

- name: Start backend application using PM2 ecosystem configuration
  command: pm2 start ecosystem.config.js
  args:
    chdir: "{{ app_dir }}/backend"
  when: pm2_status.rc != 0
  become: no

- name: Reload/Restart backend application if already running in PM2
  command: pm2 reload clouddrive-api
  args:
    chdir: "{{ app_dir }}/backend"
  when: pm2_status.rc == 0
  become: no

- name: Install frontend application package dependencies
  npm:
    path: "{{ app_dir }}/frontend"
    state: present
  become: no

- name: Build production React assets
  command: npm run build
  args:
    chdir: "{{ app_dir }}/frontend"
  environment:
    VITE_API_URL: "/api" # Set to proxy target endpoint path
  become: no

- name: Save current PM2 processes to run on system boot
  command: pm2 save
  become: no
  changed_when: false
