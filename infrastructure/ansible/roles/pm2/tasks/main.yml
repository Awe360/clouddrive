---
- name: Install PM2 process manager globally via npm
  npm:
    name: pm2
    global: yes
    state: present

- name: Retrieve PM2 startup configuration script for systemd
  command: pm2 startup systemd -u ubuntu --hp /home/ubuntu
  register: pm2_startup
  changed_when: false

- name: Configure PM2 startup systemd service
  command: "{{ pm2_startup.stdout_lines[-1] }}"
  when: pm2_startup.stdout is search("sudo")
  become: yes
